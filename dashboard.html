<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard • AI Financial Tracker</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
</head>
<body>

  <nav>
    <div class="container nav-inner">

      <!-- BRAND WITH LOGO -->
      <div class="brand">
        <a href="dashboard.html" style="display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit;">
          <img src="assets/logo.png" alt="AI Financial Tracker logo" class="logo" />
          <span>
            AI Financial Tracker
            <span id="userBadge" class="pill" style="margin-left:8px;"></span>
          </span>
        </a>
      </div>

      <div class="nav-links">
        <a class="navlink" href="index.html" data-page="login">Login</a>
        <a class="navlink" href="dashboard.html" data-page="dashboard">Dashboard</a>
        <a class="navlink" href="add.html" data-page="add">Add</a>
        <a class="navlink" href="reports.html" data-page="reports">Reports</a>
      </div>

    </div>
  </nav>

  <main class="container">

    <header class="page-head">
      <h1>Dashboard</h1>
      <p class="sub" id="helloSub">Monthly overview + AI insights</p>
    </header>

    <!-- KPI -->
    <section class="grid cols-3">
      <div class="card">
        <div class="kpi">Income</div>
        <div class="kpi-value" id="kpiIncome">$0.00</div>
      </div>

      <div class="card">
        <div class="kpi">Expenses</div>
        <div class="kpi-value" id="kpiExpense">$0.00</div>
      </div>

      <div class="card">
        <div class="kpi">Remaining</div>
        <div class="kpi-value" id="kpiRemain">$0.00</div>
      </div>
    </section>

    <!-- PROGRESS BAR -->
    <div class="panel pad" style="margin-top:14px;">
      <h3>Budget Progress</h3>

      <div style="background:rgba(255,255,255,0.08); height:14px; border-radius:999px; overflow:hidden;">
        <div id="budgetBar" style="height:100%; width:0%; background:linear-gradient(90deg,#6ea8ff,#3ddc97); transition:0.4s;"></div>
      </div>

      <div class="small" id="budgetLabel" style="margin-top:6px;">—</div>
    </div>

    <div style="height:14px;"></div>

    <section class="grid cols-2">

      <!-- RECENT -->
      <div class="panel pad">
        <h2>Recent Transactions</h2>
        <div class="list" id="txList"></div>

        <div style="margin-top:14px;">
          <a class="btn primary" href="add.html">+ Add Transaction</a>
        </div>
      </div>

      <!-- AI + ACTIONS -->
      <div class="panel pad">
        <h2>AI Insights</h2>

        <div class="card" id="insightCard1"></div>
        <div style="height:10px;"></div>
        <div class="card" id="insightCard2"></div>

        <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
          <a class="btn" href="reports.html">View Reports</a>
          <button class="btn" id="btnSignOut">Sign out</button>
        </div>

        <div class="msg" id="msg"></div>

        <hr style="margin:16px 0;">

        <h3>Quick Actions</h3>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn" id="btnClearData">Clear Data</button>
          <button class="btn" id="btnReseed">Reseed Demo</button>
          <button class="btn" id="btnExport">Export JSON</button>
        </div>

        <div class="msg" id="msg2"></div>
      </div>

    </section>

  </main>

  <script src="assets/app.js"></script>

  <script>
    setActiveNav("dashboard");
    seedDemoDataIfEmpty();

    const user = getUserStub();
    const badge = document.getElementById("userBadge");
    const sub = document.getElementById("helloSub");

    if (user?.email) {
      badge.textContent = user.email;
      sub.textContent = `Signed in as ${user.email}`;
    }

    const txs = getTransactions();
    const mk = currentMonthKey();
    const summary = calcMonthlySummary(txs, mk);

    document.getElementById("kpiIncome").textContent = formatMoney(summary.income);
    document.getElementById("kpiExpense").textContent = formatMoney(summary.expense);
    document.getElementById("kpiRemain").textContent = formatMoney(summary.remaining);

    const percent = summary.income > 0 ? (summary.expense / summary.income) * 100 : 0;
    document.getElementById("budgetBar").style.width = percent + "%";
    document.getElementById("budgetLabel").textContent =
      `You have used ${percent.toFixed(1)}% of your income.`;

    const insights = buildInsights(txs, mk);
    document.getElementById("insightCard1").innerHTML =
      `<div class="small">${insights[0]?.title || ""}</div>
       <div>${insights[0]?.text || ""}</div>`;

    document.getElementById("insightCard2").innerHTML =
      `<div class="small">${insights[1]?.title || ""}</div>
       <div>${insights[1]?.text || ""}</div>`;

    document.getElementById("btnSignOut").addEventListener("click", () => {
      signOutStub();
      window.location.href = "index.html";
    });

    document.getElementById("btnClearData").addEventListener("click", () => {
      clearAllTransactions();
      window.location.reload();
    });

    document.getElementById("btnReseed").addEventListener("click", () => {
      reseedDemo();
      window.location.reload();
    });

    document.getElementById("btnExport").addEventListener("click", async () => {
      const json = exportTransactionsJSON();
      await navigator.clipboard.writeText(json);
      alert("Transactions copied to clipboard.");
    });
  </script>

</body>
</html>
