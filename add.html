<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Transaction • AI Financial Tracker</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <nav>
    <div class="container nav-inner">
      <div class="brand">
        <div class="brand-badge"></div>
        <div>AI Financial Tracker</div>
      </div>
      <div class="nav-links">
        <a class="navlink" href="index.html" data-page="login">Login</a>
        <a class="navlink" href="dashboard.html" data-page="dashboard">Dashboard</a>
        <a class="navlink" href="add.html" data-page="add">Add</a>
        <a class="navlink" href="reports.html" data-page="reports">Reports</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <header class="page-head">
      <h1>Add Transaction</h1>
      <p class="sub">Form is interactive; saving will be simulated in the next step.</p>
    </header>

    <section class="panel pad">
      <div class="row">
        <div>
          <label for="type">Type</label>
          <select id="type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>

        <div>
          <label for="category">Category</label>
          <select id="category">
            <option>Food</option>
            <option>Rent</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Utilities</option>
            <option>Entertainment</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="amount">Amount ($)</label>
          <input id="amount" type="number" step="0.01" placeholder="25.00" />
        </div>

        <div>
          <label for="date">Date</label>
          <input id="date" type="date" />
        </div>
      </div>

      <label for="note">Note</label>
      <textarea id="note" placeholder="Optional note..."></textarea>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
        <button class="btn primary" id="btnSave">Save (stub)</button>
        <a class="btn" href="dashboard.html">Back to Dashboard</a>
      </div>

      <div class="msg" id="msg"></div>
    </section>

    <footer class="container">
      Next step: we’ll save transactions into localStorage and render them in Dashboard/Reports.
    </footer>
  </main>

  <script src="assets/app.js"></script>
  <script>
  setActiveNav("add");
  seedDemoDataIfEmpty();

  // Pre-fill date with today
  document.getElementById("date").valueAsDate = new Date();

  document.getElementById("btnSave").addEventListener("click", () => {
    const type = document.getElementById("type").value;
    const category = document.getElementById("category").value;
    const amount = Number(document.getElementById("amount").value);
    const date = document.getElementById("date").value;
    const note = document.getElementById("note").value.trim();

    const msg = document.getElementById("msg");

    // Simple validation
    if (!date) {
      msg.className = "msg bad";
      msg.textContent = "Please select a date.";
      return;
    }
    if (!amount || amount <= 0) {
      msg.className = "msg bad";
      msg.textContent = "Please enter a valid amount greater than 0.";
      return;
    }

    addTransaction({
      id: crypto.randomUUID(),
      type,
      category,
      amount,
      date,
      note
    });

    msg.className = "msg ok";
    msg.textContent = "Saved! Redirecting to Dashboard...";

    setTimeout(() => (window.location.href = "dashboard.html"), 700);
  });
</script>
</body>
</html>
