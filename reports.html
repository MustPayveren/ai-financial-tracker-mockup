<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports • AI Financial Tracker</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <nav>
    <div class="container nav-inner">
      <div class="brand">
        <div class="brand-badge"></div>
        <div>AI Financial Tracker</div>
      </div>
      <div class="nav-links">
        <a class="navlink" href="index.html" data-page="login">Login</a>
        <a class="navlink" href="dashboard.html" data-page="dashboard">Dashboard</a>
        <a class="navlink" href="add.html" data-page="add">Add</a>
        <a class="navlink" href="reports.html" data-page="reports">Reports</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <header class="page-head">
      <h1>Reports</h1>
      <p class="sub">Spending by category + AI insight (calculated from saved transactions).</p>

      <!-- Month controls -->
      <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="btnThisMonth">This month</button>
        <button class="btn" id="btnLastMonth">Last month</button>
        <span class="pill" id="pillMonth">—</span>
      </div>
    </header>

    <section class="grid cols-2">
      <!-- LEFT: Category totals -->
      <div class="panel pad" id="leftPanel">
        <h2 style="margin-top:0;">Spending by Category</h2>
        <div class="list" id="catList"></div>
      </div>

      <!-- RIGHT: AI Insight -->
      <div class="panel pad" id="rightPanel">
        <h2 style="margin-top:0;">AI Insight</h2>
        <div class="card" id="insightCard">
          <div class="small">AI Insight</div>
          <div style="margin-top:6px;">—</div>
        </div>

        <div style="margin-top:14px;">
          <button class="btn" id="btnRefresh">Refresh reports</button>
          <div class="msg" id="msg"></div>
        </div>
      </div>
    </section>

    <footer class="container">
      Mock-up only • Totals computed in JavaScript • Data stored in localStorage
    </footer>
  </main>

  <script src="assets/app.js"></script>
  <script>
    setActiveNav("reports");
    seedDemoDataIfEmpty();

    // Month state
    let mk = currentMonthKey();
    const pill = document.getElementById("pillMonth");

    function setMonthLabel() {
      pill.textContent = mk;
    }
    setMonthLabel();

    function renderReports() {
      const txs = getTransactions();

      // Calculate category totals (expenses only)
      const totals = calcCategoryTotals(txs, mk);
      const entries = Object.entries(totals).sort((a, b) => b[1] - a[1]);

      // TOP CATEGORY (5C)
      const topCategory = entries.length > 0 ? entries[0][0] : null;

      // Render category list
      const catList = document.getElementById("catList");
      catList.innerHTML = "";

      if (entries.length === 0) {
        catList.innerHTML = `<div class="msg">No expense data for this month.</div>`;
      } else {
        for (const [cat, amt] of entries) {
          const isTop = cat === topCategory;

          const row = document.createElement("div");
          row.className = "item";
          row.innerHTML = `
            <div>
              <strong>${cat}</strong>
              ${isTop ? '<span class="pill expense" style="margin-left:6px;">Top</span>' : ''}
              <div class="small">Monthly total</div>
            </div>
            <div><strong>${formatMoney(amt)}</strong></div>
          `;
          catList.appendChild(row);
        }
      }

      // Render AI insight (based on data)
      const insights = buildInsights(txs, mk);
      const insightCard = document.getElementById("insightCard");

      insightCard.innerHTML = `
        <div class="small">${insights[0]?.title || "AI Insight"}</div>
        <div style="margin-top:6px;">${insights[0]?.text || "—"}</div>
      `;
    }

    // Buttons
    document.getElementById("btnRefresh").addEventListener("click", () => {
      renderReports();
      const msg = document.getElementById("msg");
      msg.className = "msg ok";
      msg.textContent = "Reports refreshed from saved transactions.";
    });

    document.getElementById("btnThisMonth").addEventListener("click", () => {
      mk = currentMonthKey();
      setMonthLabel();
      renderReports();
    });

    document.getElementById("btnLastMonth").addEventListener("click", () => {
      const now = new Date();
      const last = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const y = last.getFullYear();
      const m = String(last.getMonth() + 1).padStart(2, "0");
      mk = `${y}-${m}`;
      setMonthLabel();
      renderReports();
    });

    // Initial render
    renderReports();
  </script>
</body>
</html>
